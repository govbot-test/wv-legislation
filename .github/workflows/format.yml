name: Format Data for wv

on:
  # Backup only -- the real trigger is repository_dispatch from scrape
  # finishing (cross-org, see openstates-scrape.yml's "Trigger format
  # workflow" step). Cheap to leave running since the SHA-staleness check
  # below skips in ~10s when the dispatch already handled it.
  schedule:
    - cron: "0 12 * * *"  # Daily at 12:00 PM UTC (6:00 AM Chicago time)
  repository_dispatch:
    types: [scrape-complete]
  workflow_dispatch:
    inputs:
      force-update:
        type: boolean
        description: "Force push even if upstream changed (use with caution)"
        default: false

# Same reasoning as extract-text.yml's concurrency block -- avoid a
# scheduled run cancelling/racing a still-in-flight manual one.
concurrency:
  group: format
  cancel-in-progress: false

env:
  STATE_CODE: wv
  SCRAPER_REPO: govbot-openstates-scrapers/wv-legislation

jobs:
  format:
    name: "📝 Format Data"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout files repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run formatter action
        uses: chihacknight/govbot/actions/format@main
        with:
          state: ${{ env.STATE_CODE }}
          scraper-repo: ${{ env.SCRAPER_REPO }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          force-update: ${{ inputs.force-update }}

